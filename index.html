<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mtkonch admin halab</title>
  <style>
    /* Font settings - Added Nosifer for the dripping blood effect */
    @import url('https://fonts.googleapis.com/css2?family=Nosifer&family=Poppins:wght@500;700;900&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      color: #ffffff;
      background-color: #000;
      overflow: hidden;
    }

    /* Video Background Container */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .video-background iframe {
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: none;
      filter: contrast(1.2) brightness(0.7); /* Slightly darker for better red contrast */
    }

    /* Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 12, 16, 0.6);
      z-index: 1;
    }

    /* Main Content Container */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Main Title - Dripping Blood Effect */
    h1 {
      font-family: 'Nosifer', cursive; /* Dripping blood font */
      font-size: 3.5rem;
      text-transform: uppercase;
      color: #ff0000; /* Blood red */
      text-shadow: 0 5px 15px rgba(255, 0, 0, 0.8), 0 10px 30px rgba(139, 0, 0, 0.9);
      margin-bottom: 60px;
      text-align: center;
      animation: bloodGlow 2.5s infinite alternate;
    }

    /* Cards Container */
    .cards-container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Card Design */
    .card {
      background: rgba(20, 0, 0, 0.3); /* Dark red tint */
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 20px;
      padding: 40px 30px;
      width: 250px;
      text-align: center;
      transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-15px) scale(1.05);
      border-color: #ff0000;
      box-shadow: 0 15px 40px rgba(255, 0, 0, 0.5);
      background: rgba(255, 0, 0, 0.15);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #ff0000;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
      object-fit: cover;
      background-color: #111;
      animation: pulseBorder 2s infinite alternate;
    }

    /* Animations */
    @keyframes bloodGlow {
      from {
        text-shadow: 0 5px 10px #ff0000, 0 10px 20px #8b0000;
        transform: scale(1);
      }
      to {
        text-shadow: 0 10px 25px #ff0000, 0 15px 45px #8b0000;
        transform: scale(1.02);
      }
    }

    @keyframes pulseBorder {
      from {
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
      }
      to {
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.8), 0 0 40px rgba(255, 0, 0, 0.4);
      }
    }
  </style>
</head>

<body>

  <div class="video-background">
    <iframe src="https://streamable.com/e/j075oh?autoplay=1&muted=0&nocontrols=1&loop=1" allow="autoplay; fullscreen"
      allowfullscreen></iframe>
  </div>

  <div class="overlay"></div>

  <div class="content">
    <h1>mtkonch admin halab</h1>

    <div class="cards-container">

      

    </div>
  </div>

</body>

</html>
